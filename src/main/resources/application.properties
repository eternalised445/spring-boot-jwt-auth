# ============================================================
#  application.properties — Central configuration for our app
# ============================================================

# ----- Server -----
# The port our app will listen on (default is 8080)
server.port=8080

# ----- MySQL Database Connection -----
# Change 'auth_db' to your database name, and update username/password
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate -----
# 'update' means Hibernate will auto-create or update tables based on our entities
# Use 'create' to drop and recreate tables every time (useful for fresh starts)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ----- JWT Settings -----
# Secret key used to sign JWT tokens — keep this long, random, and PRIVATE in production
jwt.secret=myVerySecretKeyThatShouldBeLongEnoughForHS256AlgorithmToWork1234567890
# Token expiry in milliseconds: 86400000 ms = 24 hours
jwt.expiration=86400000
